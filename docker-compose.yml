services:
  app:
    build:
      context: .
      target: builder
    image: skillhub-api:dev
    container_name: skillhub-app
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "src/server.js"]

  db:
    image: postgres:16-alpine
    container_name: skillhub-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillhub}
      POSTGRES_USER: ${POSTGRES_USER:-skillhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skillhub}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data: